<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HNSW 可视化</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --panel: #0f1527;
    --border: #1e2a45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --green: #00ff9d;
    --text: #c8d8f0;
    --muted: #4a6080;
    --layer-colors: #00d4ff, #7c3aed, #ff6b35, #00ff9d, #ff3366;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 背景网格 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
    background: rgba(15,21,39,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .logo span { color: var(--text); font-weight: 300; }

  .header-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── Layout ── */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  /* ── Panels ── */
  .panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
  }

  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Controls ── */
  .control-group { margin-bottom: 20px; }

  .control-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .control-label span {
    color: var(--accent);
    font-weight: 600;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent);
  }

  .btn {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    margin-bottom: 8px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px rgba(0,212,255,0.15); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: rgba(0,212,255,0.1); }
  .btn.danger { border-color: #ff3366; color: #ff3366; }
  .btn.danger:hover { background: rgba(255,51,102,0.1); }

  /* ── Canvas area ── */
  .canvas-area {
    position: relative;
    overflow: hidden;
  }

  /* ── Layer tabs ── */
  .layer-tabs {
    position: absolute;
    top: 16px;
    left: 16px;
    display: flex;
    gap: 6px;
    z-index: 10;
  }

  .layer-tab {
    padding: 4px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    color: var(--muted);
    background: rgba(15,21,39,0.8);
  }

  .layer-tab.active {
    color: #fff;
    border-color: currentColor;
  }

  .layer-tab[data-layer="0"] { --lc: #00d4ff; }
  .layer-tab[data-layer="1"] { --lc: #7c3aed; }
  .layer-tab[data-layer="2"] { --lc: #ff6b35; }
  .layer-tab[data-layer="3"] { --lc: #00ff9d; }

  .layer-tab.active { color: var(--lc); border-color: var(--lc); box-shadow: 0 0 10px rgba(0,0,0,0.5); }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Search overlay ── */
  .search-overlay {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .search-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(15,21,39,0.9);
    padding: 6px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  /* ── Right panel ── */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .stat-key {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 11px;
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 600;
  }

  .log-area {
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.8;
    max-height: 300px;
    overflow-y: auto;
  }

  .log-line { padding: 2px 0; }
  .log-line.insert { color: var(--green); }
  .log-line.search { color: var(--accent); }
  .log-line.result { color: var(--accent2); }
  .log-line.info   { color: var(--muted); }

  /* ── Legend ── */
  .legend {
    margin-top: 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-line {
    width: 20px;
    height: 2px;
    flex-shrink: 0;
  }

  /* ── Node info tooltip ── */
  .tooltip {
    position: absolute;
    background: rgba(15,21,39,0.95);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    pointer-events: none;
    z-index: 100;
    display: none;
    min-width: 160px;
  }

  .tooltip-title {
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .tooltip-row {
    color: var(--muted);
    line-height: 1.8;
  }

  .tooltip-row span { color: var(--text); }

  /* Mode indicator */
  .mode-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 3px;
    z-index: 10;
  }

  .mode-badge.insert { background: rgba(0,255,157,0.1); color: var(--green); border: 1px solid var(--green); }
  .mode-badge.search { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">HNSW <span>/ visualizer</span></div>
    <div class="header-info">点击画布插入节点 · 右键搜索最近邻</div>
  </header>

  <div class="main">
    <!-- Left Panel -->
    <div class="panel">
      <div class="panel-title">Parameters</div>

      <div class="control-group">
        <div class="control-label">M（每层最大邻居数）<span id="m-val">6</span></div>
        <input type="range" id="m-slider" min="2" max="12" value="6">
      </div>

      <div class="control-group">
        <div class="control-label">ef_construction <span id="ef-val">20</span></div>
        <input type="range" id="ef-slider" min="5" max="50" value="20">
      </div>

      <div class="control-group">
        <div class="control-label">ef_search <span id="efs-val">10</span></div>
        <input type="range" id="efs-slider" min="3" max="30" value="10">
      </div>

      <div class="control-group">
        <div class="control-label">K（返回近邻数）<span id="k-val">3</span></div>
        <input type="range" id="k-slider" min="1" max="8" value="3">
      </div>

      <hr style="border-color: var(--border); margin: 16px 0;">

      <button class="btn primary" id="add-random">+ 随机插入 10 个节点</button>
      <button class="btn primary" id="add-random-1">+ 随机插入 1 个节点</button>
      <button class="btn" id="toggle-mode">切换到搜索模式</button>
      <button class="btn danger" id="reset">重置</button>

      <div class="legend" style="margin-top: 20px;">
        <div class="panel-title">Legend</div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#00d4ff; box-shadow: 0 0 6px #00d4ff"></div>
          Layer 0（所有节点）
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#7c3aed; box-shadow: 0 0 6px #7c3aed"></div>
          Layer 1
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ff6b35; box-shadow: 0 0 6px #ff6b35"></div>
          Layer 2
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#00ff9d; box-shadow: 0 0 6px #00ff9d"></div>
          Layer 3+
        </div>
        <div class="legend-item" style="margin-top:8px;">
          <div class="legend-dot" style="background:#ff3366; box-shadow: 0 0 8px #ff3366; width:14px;height:14px;"></div>
          入口点 (entry point)
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ffd700; box-shadow: 0 0 8px #ffd700; width:14px;height:14px;"></div>
          查询点 / 搜索结果
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-area" id="canvas-area">
      <div class="layer-tabs" id="layer-tabs"></div>
      <div class="mode-badge insert" id="mode-badge">INSERT MODE</div>
      <canvas id="canvas"></canvas>
      <div class="search-overlay">
        <div class="search-hint" id="mode-hint">左键：插入节点 · 右键：搜索最近邻</div>
      </div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <!-- Right Panel -->
    <div class="panel">
      <div class="panel-title">Stats</div>
      <div id="stats-area">
        <div class="stat-row"><span class="stat-key">nodes</span><span class="stat-val" id="s-nodes">0</span></div>
        <div class="stat-row"><span class="stat-key">max_layer</span><span class="stat-val" id="s-maxlayer">-1</span></div>
        <div class="stat-row"><span class="stat-key">entry_point</span><span class="stat-val" id="s-ep">None</span></div>
        <div class="stat-row"><span class="stat-key">M</span><span class="stat-val" id="s-m">6</span></div>
        <div class="stat-row"><span class="stat-key">ef_construction</span><span class="stat-val" id="s-ef">20</span></div>
        <div id="layer-stats"></div>
      </div>

      <div class="panel-title" style="margin-top: 20px;">Log</div>
      <div class="log-area" id="log-area"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  HNSW Core (simplified 2D version)
// ─────────────────────────────────────────────

class Node {
  constructor(id, x, y, maxLayer) {
    this.id = id;
    this.x = x;
    this.y = y;
    this.maxLayer = maxLayer;
    this.neighbors = Array.from({length: maxLayer + 1}, () => []);
  }
}

class HNSW {
  constructor(M = 6, efConstruction = 20) {
    this.M = M;
    this.M0 = 2 * M;
    this.efConstruction = efConstruction;
    this.mL = 1.0 / Math.log(M);
    this.nodes = new Map();
    this.entryPoint = null;
    this.maxLayer = -1;
    this.nextId = 0;
  }

  dist(ax, ay, bx, by) {
    return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
  }

  distToNode(x, y, nodeId) {
    const n = this.nodes.get(nodeId);
    return this.dist(x, y, n.x, n.y);
  }

  randomLayer() {
    return Math.floor(-Math.log(Math.random()) * this.mL);
  }

  searchLayer(qx, qy, entryPoints, ef, layer) {
    const visited = new Set(entryPoints);
    // min-heap: [dist, id]
    const candidates = new MinHeap((a, b) => a[0] - b[0]);
    // max-heap for results: [-dist, id]
    const results = new MinHeap((a, b) => a[0] - b[0]);

    for (const ep of entryPoints) {
      const d = this.distToNode(qx, qy, ep);
      candidates.push([d, ep]);
      results.push([-d, ep]);
    }

    while (!candidates.empty()) {
      const [cDist, cId] = candidates.pop();
      const worstDist = -results.peek()[0];
      if (cDist > worstDist) break;

      const node = this.nodes.get(cId);
      if (!node || layer > node.maxLayer) continue;
      for (const nbId of node.neighbors[layer] || []) {
        if (visited.has(nbId)) continue;
        visited.add(nbId);
        const nbDist = this.distToNode(qx, qy, nbId);
        const worst = -results.peek()[0];
        if (nbDist < worst || results.size() < ef) {
          candidates.push([nbDist, nbId]);
          results.push([-nbDist, nbId]);
          if (results.size() > ef) results.pop();
        }
      }
    }

    return results.toArray().map(([nd, id]) => [-nd, id]).sort((a, b) => a[0] - b[0]);
  }

  selectNeighborsHeuristic(qx, qy, candidates, M) {
    const result = [];
    const W = new MinHeap((a, b) => a[0] - b[0]);
    for (const c of candidates) W.push(c);
    const discarded = [];

    while (!W.empty() && result.length < M) {
      const [eDist, eId] = W.pop();
      const en = this.nodes.get(eId);
      if (!en) continue;

      let good = true;
      for (const [, rId] of result) {
        const rn = this.nodes.get(rId);
        if (!rn) continue;
        const dER = this.dist(en.x, en.y, rn.x, rn.y);
        if (dER < eDist) { good = false; break; }
      }
      if (good) result.push([eDist, eId]);
      else discarded.push([eDist, eId]);
    }

    for (const item of discarded) {
      if (result.length >= M) break;
      result.push(item);
    }
    return result;
  }

  add(x, y) {
    const nodeId = this.nextId++;
    const nodeLayer = this.randomLayer();
    const node = new Node(nodeId, x, y, nodeLayer);
    this.nodes.set(nodeId, node);

    const logInfo = { id: nodeId, layer: nodeLayer, connections: [] };

    if (this.entryPoint === null) {
      this.entryPoint = nodeId;
      this.maxLayer = nodeLayer;
      return logInfo;
    }

    let currEp = [this.entryPoint];

    for (let layer = this.maxLayer; layer > nodeLayer; layer--) {
      const res = this.searchLayer(x, y, currEp, 1, layer);
      currEp = res.map(([, id]) => id);
    }

    for (let layer = Math.min(nodeLayer, this.maxLayer); layer >= 0; layer--) {
      const candidates = this.searchLayer(x, y, currEp, this.efConstruction, layer);
      const maxConn = layer === 0 ? this.M0 : this.M;
      const neighbors = this.selectNeighborsHeuristic(x, y, candidates, maxConn);

      node.neighbors[layer] = neighbors.map(([, id]) => id);
      logInfo.connections.push({ layer, neighbors: node.neighbors[layer] });

      for (const [, nid] of neighbors) {
        const nbNode = this.nodes.get(nid);
        if (!nbNode || layer > nbNode.maxLayer) continue;
        nbNode.neighbors[layer].push(nodeId);
        if (nbNode.neighbors[layer].length > maxConn) {
          const cands = nbNode.neighbors[layer].map(id => {
            const nn = this.nodes.get(id);
            return [this.dist(nbNode.x, nbNode.y, nn.x, nn.y), id];
          });
          const kept = this.selectNeighborsHeuristic(nbNode.x, nbNode.y, cands, maxConn);
          nbNode.neighbors[layer] = kept.map(([, id]) => id);
        }
      }

      currEp = candidates.map(([, id]) => id);
    }

    if (nodeLayer > this.maxLayer) {
      this.maxLayer = nodeLayer;
      this.entryPoint = nodeId;
    }

    return logInfo;
  }

  search(qx, qy, k, ef) {
    if (this.entryPoint === null) return [];
    let currEp = [this.entryPoint];
    const visited = []; // track search path for visualization

    for (let layer = this.maxLayer; layer > 0; layer--) {
      const res = this.searchLayer(qx, qy, currEp, 1, layer);
      visited.push({ layer, nodes: res.map(([, id]) => id) });
      currEp = res.map(([, id]) => id);
    }

    const candidates = this.searchLayer(qx, qy, currEp, ef, 0);
    visited.push({ layer: 0, nodes: candidates.map(([, id]) => id) });
    return { results: candidates.slice(0, k), visited };
  }

  stats() {
    const layerCounts = {};
    for (const node of this.nodes.values()) {
      layerCounts[node.maxLayer] = (layerCounts[node.maxLayer] || 0) + 1;
    }
    return {
      total: this.nodes.size,
      maxLayer: this.maxLayer,
      entryPoint: this.entryPoint,
      layerCounts
    };
  }
}

// ── Min-Heap ──
class MinHeap {
  constructor(cmp) { this.data = []; this.cmp = cmp; }
  push(v) {
    this.data.push(v);
    let i = this.data.length - 1;
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (this.cmp(this.data[p], this.data[i]) <= 0) break;
      [this.data[p], this.data[i]] = [this.data[i], this.data[p]];
      i = p;
    }
  }
  pop() {
    const top = this.data[0];
    const last = this.data.pop();
    if (this.data.length > 0) {
      this.data[0] = last;
      let i = 0;
      while (true) {
        let s = i, l = 2*i+1, r = 2*i+2;
        if (l < this.data.length && this.cmp(this.data[l], this.data[s]) < 0) s = l;
        if (r < this.data.length && this.cmp(this.data[r], this.data[s]) < 0) s = r;
        if (s === i) break;
        [this.data[s], this.data[i]] = [this.data[i], this.data[s]];
        i = s;
      }
    }
    return top;
  }
  peek() { return this.data[0]; }
  empty() { return this.data.length === 0; }
  size() { return this.data.length; }
  toArray() { return [...this.data]; }
}

// ─────────────────────────────────────────────
//  Renderer
// ─────────────────────────────────────────────

const LAYER_COLORS = ['#00d4ff', '#7c3aed', '#ff6b35', '#00ff9d', '#ff3366'];
const EDGE_ALPHA = [0.25, 0.35, 0.45, 0.55, 0.65];

let hnsw = new HNSW(6, 20);
let currentLayer = 0;
let mode = 'insert'; // 'insert' | 'search'
let searchResult = null;
let searchQuery = null;
let hoveredNode = null;
let animatingNodes = new Set();

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const area = document.getElementById('canvas-area');

function resize() {
  canvas.width = area.clientWidth * devicePixelRatio;
  canvas.height = area.clientHeight * devicePixelRatio;
  canvas.style.width = area.clientWidth + 'px';
  canvas.style.height = area.clientHeight + 'px';
  draw();
}

// Map canvas coords to/from world [0,1]
function toWorld(cx, cy) {
  const pad = 40 * devicePixelRatio;
  const w = canvas.width - pad * 2;
  const h = canvas.height - pad * 2;
  return [(cx * devicePixelRatio - pad) / w, (cy * devicePixelRatio - pad) / h];
}

function toCanvas(wx, wy) {
  const pad = 40 * devicePixelRatio;
  const w = canvas.width - pad * 2;
  const h = canvas.height - pad * 2;
  return [wx * w + pad, wy * h + pad];
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (hnsw.nodes.size === 0) {
    ctx.fillStyle = 'rgba(74,96,128,0.3)';
    ctx.font = `${14 * devicePixelRatio}px JetBrains Mono`;
    ctx.textAlign = 'center';
    ctx.fillText('左键点击画布插入节点', canvas.width / 2, canvas.height / 2);
    return;
  }

  // Draw edges for current layer
  const searchNodeSet = new Set(searchResult ? searchResult.results.map(([,id]) => id) : []);
  const visitedSet = new Set(searchResult ? searchResult.visited.flatMap(v => v.nodes) : []);

  for (const node of hnsw.nodes.values()) {
    if (node.maxLayer < currentLayer) continue;
    const [nx, ny] = toCanvas(node.x, node.y);

    for (const nbId of (node.neighbors[currentLayer] || [])) {
      const nb = hnsw.nodes.get(nbId);
      if (!nb || nb.maxLayer < currentLayer) continue;
      const [nbx, nby] = toCanvas(nb.x, nb.y);

      const isSearchEdge = searchNodeSet.has(node.id) && searchNodeSet.has(nbId);
      ctx.beginPath();
      ctx.moveTo(nx, ny);
      ctx.lineTo(nbx, nby);
      if (isSearchEdge) {
        ctx.strokeStyle = 'rgba(255,215,0,0.6)';
        ctx.lineWidth = 2 * devicePixelRatio;
      } else {
        const col = LAYER_COLORS[Math.min(currentLayer, LAYER_COLORS.length - 1)];
        ctx.strokeStyle = col + '40';
        ctx.lineWidth = 1 * devicePixelRatio;
      }
      ctx.stroke();
    }
  }

  // Draw search path lines
  if (searchQuery && searchResult) {
    const [qx, qy] = toCanvas(searchQuery.x, searchQuery.y);
    for (const [, id] of searchResult.results) {
      const n = hnsw.nodes.get(id);
      if (!n) continue;
      const [nx, ny] = toCanvas(n.x, n.y);
      ctx.beginPath();
      ctx.moveTo(qx, qy);
      ctx.lineTo(nx, ny);
      ctx.setLineDash([4 * devicePixelRatio, 4 * devicePixelRatio]);
      ctx.strokeStyle = 'rgba(255,215,0,0.5)';
      ctx.lineWidth = 1.5 * devicePixelRatio;
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Draw nodes
  for (const node of hnsw.nodes.values()) {
    if (node.maxLayer < currentLayer) continue;
    const [nx, ny] = toCanvas(node.x, node.y);
    const isEntry = node.id === hnsw.entryPoint;
    const isResult = searchNodeSet.has(node.id);
    const isVisited = visitedSet.has(node.id);
    const isHovered = node.id === hoveredNode;

    const r = devicePixelRatio * (isEntry ? 8 : isResult ? 7 : isHovered ? 7 : 5);
    const color = isEntry ? '#ff3366' : isResult ? '#ffd700' : isVisited ? '#ff9944' : LAYER_COLORS[Math.min(currentLayer, LAYER_COLORS.length - 1)];

    // Glow
    ctx.beginPath();
    ctx.arc(nx, ny, r * 2, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(nx, ny, 0, nx, ny, r * 2);
    g.addColorStop(0, color + '40');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fill();

    // Node
    ctx.beginPath();
    ctx.arc(nx, ny, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Label
    if (isHovered || isEntry || isResult) {
      ctx.font = `${10 * devicePixelRatio}px JetBrains Mono`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(`#${node.id}`, nx, ny - r - 4 * devicePixelRatio);
    }
  }

  // Draw search query point
  if (searchQuery) {
    const [qx, qy] = toCanvas(searchQuery.x, searchQuery.y);
    const r = 8 * devicePixelRatio;
    ctx.beginPath();
    ctx.arc(qx, qy, r * 1.8, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(qx, qy, 0, qx, qy, r * 1.8);
    g.addColorStop(0, 'rgba(255,215,0,0.3)');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(qx, qy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd700';
    ctx.fill();
    ctx.font = `${10 * devicePixelRatio}px JetBrains Mono`;
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.fillText('Q', qx, qy + 3.5 * devicePixelRatio);
  }
}

// ─────────────────────────────────────────────
//  UI Updates
// ─────────────────────────────────────────────

function updateLayerTabs() {
  const container = document.getElementById('layer-tabs');
  container.innerHTML = '';
  for (let l = 0; l <= hnsw.maxLayer; l++) {
    const tab = document.createElement('div');
    tab.className = 'layer-tab' + (l === currentLayer ? ' active' : '');
    tab.dataset.layer = l;
    tab.textContent = `L${l}`;
    tab.onclick = () => { currentLayer = l; updateLayerTabs(); draw(); };
    container.appendChild(tab);
  }
}

function updateStats() {
  const s = hnsw.stats();
  document.getElementById('s-nodes').textContent = s.total;
  document.getElementById('s-maxlayer').textContent = s.maxLayer;
  document.getElementById('s-ep').textContent = s.entryPoint === null ? 'None' : `#${s.entryPoint}`;
  document.getElementById('s-m').textContent = hnsw.M;
  document.getElementById('s-ef').textContent = hnsw.efConstruction;

  let layerHtml = '';
  for (let l = 0; l <= s.maxLayer; l++) {
    const count = [...hnsw.nodes.values()].filter(n => n.maxLayer >= l).length;
    layerHtml += `<div class="stat-row"><span class="stat-key">layer_${l} nodes</span><span class="stat-val">${count}</span></div>`;
  }
  document.getElementById('layer-stats').innerHTML = layerHtml;
}

const logArea = document.getElementById('log-area');
function log(msg, type = 'info') {
  const div = document.createElement('div');
  div.className = `log-line ${type}`;
  div.textContent = msg;
  logArea.appendChild(div);
  logArea.scrollTop = logArea.scrollHeight;
  if (logArea.children.length > 100) logArea.removeChild(logArea.firstChild);
}

// ─────────────────────────────────────────────
//  Event Handlers
// ─────────────────────────────────────────────

canvas.addEventListener('click', (e) => {
  if (mode !== 'insert') return;
  const rect = canvas.getBoundingClientRect();
  const [wx, wy] = toWorld(e.clientX - rect.left, e.clientY - rect.top);
  if (wx < 0 || wx > 1 || wy < 0 || wy > 1) return;

  const info = hnsw.add(wx, wy);
  log(`+ node #${info.id}  layer=${info.layer}`, 'insert');
  for (const c of info.connections) {
    if (c.neighbors.length > 0)
      log(`  L${c.layer}: → [${c.neighbors.map(id => '#' + id).join(', ')}]`, 'info');
  }

  if (currentLayer > hnsw.maxLayer) currentLayer = hnsw.maxLayer;
  updateLayerTabs();
  updateStats();
  draw();
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (hnsw.nodes.size === 0) return;
  const rect = canvas.getBoundingClientRect();
  const [wx, wy] = toWorld(e.clientX - rect.left, e.clientY - rect.top);
  if (wx < 0 || wx > 1 || wy < 0 || wy > 1) return;

  const k = parseInt(document.getElementById('k-slider').value);
  const ef = parseInt(document.getElementById('efs-slider').value);

  searchQuery = { x: wx, y: wy };
  searchResult = hnsw.search(wx, wy, k, ef);

  log(`⌕ search (${wx.toFixed(2)}, ${wy.toFixed(2)})  k=${k}  ef=${ef}`, 'search');
  for (const [d, id] of searchResult.results) {
    log(`  → #${id}  dist=${d.toFixed(4)}`, 'result');
  }

  // switch to layer 0 to show results
  currentLayer = 0;
  updateLayerTabs();
  updateStats();
  draw();
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * devicePixelRatio;
  const cy = (e.clientY - rect.top) * devicePixelRatio;
  const tooltip = document.getElementById('tooltip');

  let found = null;
  for (const node of hnsw.nodes.values()) {
    if (node.maxLayer < currentLayer) continue;
    const [nx, ny] = toCanvas(node.x, node.y);
    const d = Math.sqrt((cx - nx) ** 2 + (cy - ny) ** 2);
    if (d < 10 * devicePixelRatio) { found = node; break; }
  }

  if (found) {
    hoveredNode = found.id;
    const totalNeighbors = found.neighbors.reduce((s, l) => s + l.length, 0);
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
    tooltip.innerHTML = `
      <div class="tooltip-title">Node #${found.id}</div>
      <div class="tooltip-row">max_layer: <span>${found.maxLayer}</span></div>
      <div class="tooltip-row">pos: <span>(${found.x.toFixed(3)}, ${found.y.toFixed(3)})</span></div>
      ${found.neighbors.map((nb, l) => nb.length > 0 ? `<div class="tooltip-row">L${l} neighbors: <span>[${nb.map(id => '#' + id).join(', ')}]</span></div>` : '').join('')}
    `;
    draw();
  } else {
    hoveredNode = null;
    tooltip.style.display = 'none';
    if (found !== hoveredNode) draw();
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  document.getElementById('tooltip').style.display = 'none';
  draw();
});

// ─────────────────────────────────────────────
//  Controls
// ─────────────────────────────────────────────

document.getElementById('m-slider').addEventListener('input', function() {
  document.getElementById('m-val').textContent = this.value;
});
document.getElementById('ef-slider').addEventListener('input', function() {
  document.getElementById('ef-val').textContent = this.value;
});
document.getElementById('efs-slider').addEventListener('input', function() {
  document.getElementById('efs-val').textContent = this.value;
});
document.getElementById('k-slider').addEventListener('input', function() {
  document.getElementById('k-val').textContent = this.value;
});

document.getElementById('add-random').addEventListener('click', () => {
  const M = parseInt(document.getElementById('m-slider').value);
  const ef = parseInt(document.getElementById('ef-slider').value);
  if (hnsw.M !== M || hnsw.efConstruction !== ef) {
    hnsw.M = M; hnsw.M0 = 2 * M;
    hnsw.efConstruction = ef;
    hnsw.mL = 1.0 / Math.log(M);
  }
  for (let i = 0; i < 10; i++) {
    const info = hnsw.add(Math.random(), Math.random());
    log(`+ node #${info.id}  layer=${info.layer}`, 'insert');
  }
  if (currentLayer > hnsw.maxLayer) currentLayer = hnsw.maxLayer;
  updateLayerTabs(); updateStats(); draw();
});

document.getElementById('add-random-1').addEventListener('click', () => {
  const M = parseInt(document.getElementById('m-slider').value);
  const ef = parseInt(document.getElementById('ef-slider').value);
  if (hnsw.M !== M || hnsw.efConstruction !== ef) {
    hnsw.M = M; hnsw.M0 = 2 * M;
    hnsw.efConstruction = ef;
    hnsw.mL = 1.0 / Math.log(M);
  }
  const info = hnsw.add(Math.random(), Math.random());
  log(`+ node #${info.id}  layer=${info.layer}`, 'insert');
  if (currentLayer > hnsw.maxLayer) currentLayer = hnsw.maxLayer;
  updateLayerTabs(); updateStats(); draw();
});

document.getElementById('toggle-mode').addEventListener('click', () => {
  mode = mode === 'insert' ? 'search' : 'insert';
  const badge = document.getElementById('mode-badge');
  const hint = document.getElementById('mode-hint');
  const btn = document.getElementById('toggle-mode');
  if (mode === 'search') {
    badge.className = 'mode-badge search';
    badge.textContent = 'SEARCH MODE';
    hint.textContent = '右键：搜索最近邻';
    btn.textContent = '切换到插入模式';
  } else {
    badge.className = 'mode-badge insert';
    badge.textContent = 'INSERT MODE';
    hint.textContent = '左键：插入节点 · 右键：搜索最近邻';
    btn.textContent = '切换到搜索模式';
    searchResult = null;
    searchQuery = null;
    draw();
  }
});

document.getElementById('reset').addEventListener('click', () => {
  const M = parseInt(document.getElementById('m-slider').value);
  const ef = parseInt(document.getElementById('ef-slider').value);
  hnsw = new HNSW(M, ef);
  currentLayer = 0;
  searchResult = null;
  searchQuery = null;
  logArea.innerHTML = '';
  log('— 已重置 —', 'info');
  updateLayerTabs();
  updateStats();
  draw();
});

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────

window.addEventListener('resize', resize);
resize();
log('— HNSW 可视化就绪 —', 'info');
log('左键插入节点，右键搜索最近邻', 'info');
updateLayerTabs();
updateStats();
</script>
